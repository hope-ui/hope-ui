name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.10.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      # Must run after Build: it reads `packages/*/dist`. Enforces the invariant SSR silently
      # depends on — no component writes a literal host JSX element — and doubles as the
      # tripwire for a `babel-preset-solid@1.x` creeping back into the compiler pipeline.
      # See the script's header, and CLAUDE.md.
      - name: Assert dist imports no client-only @solidjs/web helper
        run: pnpm check:dist-imports

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps --only-shell

      - name: Browser tests
        run: pnpm test:browser

      # The only mechanical guard on .storybook/main.ts. It compiles every story through
      # the same Solid pipeline as the build, so a broken framework/plugin interaction
      # (see CLAUDE.md, "Build/test/Storybook share one Solid compiler config") fails here
      # rather than the next time someone opens Storybook locally.
      - name: Build Storybook
        run: pnpm build:storybook

      - name: Definition-of-Done coverage/docs/stories check
        run: pnpm check:coverage-parity
