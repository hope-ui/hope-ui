name: CI

on:
  push:
    branches: [main, develop]
    # Docs-only pushes skip CI. Content of a `.md` is never checked — `check:coverage-parity`
    # only requires that a colocated doc *exists*. Filtering `push` but NOT `pull_request` is
    # deliberate: a commit that *deletes* a required `packages/*/src/**/*.md` is docs-only by
    # path yet breaks coverage-parity, so it skips here but is still caught on the develop→main
    # PR (full pipeline, unfiltered) before it can reach `main`, and by the next non-docs push.
    paths-ignore:
      - "**/*.md"
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.10.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      # Three projects, one job each — see __internal__/testing.md.
      - name: Unit tests (node, no DOM, pure logic)
        run: pnpm test

      - name: SSR tests (node, server builds of solid-js + @solidjs/web)
        run: pnpm test:ssr

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps --only-shell

      - name: Browser tests (real Chromium, DOM + hydration)
        run: pnpm test:browser

      # The only mechanical guard on .storybook/main.ts. It compiles every story through
      # the same Solid pipeline as the build, so a broken framework/plugin interaction
      # (see CLAUDE.md, "Build/test/Storybook share one Solid compiler config") fails here
      # rather than the next time someone opens Storybook locally.
      - name: Build Storybook
        run: pnpm build:storybook

      - name: Definition-of-Done coverage/docs/stories check
        run: pnpm check:coverage-parity

      # Recipes reference finished --hope-* tokens only — no color-mix, alpha modifier, or magic
      # opacity. A computed color applies a fixed rule to a base the recipe doesn't own, so a
      # consumer that redefines that base silently breaks. See __internal__/theming.md ("recipe purity").
      - name: Recipe purity check
        run: pnpm check:recipe-purity
