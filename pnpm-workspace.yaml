packages:
  - "packages/*"
  - "apps/*"

allowBuilds:
  esbuild: true

catalog:
  # The solid trio moves in lockstep (CLAUDE.md requires a single solid version). Bumped
  # beta.17 -> beta.19 because `@tanstack/solid-router` (a docs-app dep) hard-depends on
  # `@solidjs/web@2.0.0-beta.19`; a version skew breaks context/hydration, so the whole repo
  # moves together. See apps/docs and the PLAN handoff.
  solid-js: 2.0.0-beta.19
  "@solidjs/signals": 2.0.0-beta.19
  "@solidjs/web": 2.0.0-beta.19
  # Framework-agnostic virtualizer core. Adopted (not merely referenced) by
  # `createVirtualCollection`; an *optional* peerDependency of @hope-ui/primitives so the
  # kernel stays zero-dependency for consumers who never virtualize. See
  # __internal__/solid-primitives-eval.md.
  "@tanstack/virtual-core": 3.17.4
  # Immutable, locale-aware date-only value types (`CalendarDate`) — the substrate the
  # calendar family is built on, same as React Aria. See __internal__/solid-primitives-eval.md and
  # packages/primitives/src/calendar/.
  "@internationalized/date": 3.12.2
  # SolidJS 2.0 (`next`-branch) community primitive adopted by the calendar family:
  # `@solid-primitives/a11y` (`createAnnounce` — the screen-reader live-region announcer). Peers on
  # solid-js/@solidjs/web ^2.0.0-beta. Adoption verdict: __internal__/solid-primitives-eval.md.
  # (`@solid-primitives/i18n` was dropped — hope-ui's i18n module now ships its own catalog+resolver.)
  "@solid-primitives/a11y": 1.0.0-next.0
  # The Zag.js core trio, framework-agnostic pure TS (they import no framework). Consumed by the
  # vendored `@zag-js/solid` fork at `packages/primitives/src/zag-solid/`, which must stay pinned
  # to the exact adapter version it was forked from — so these move in lockstep, like the solid
  # trio. See `__internal__/primitives/zag-solid/machine.md`.
  "@zag-js/core": 1.42.0
  "@zag-js/types": 1.42.0
  "@zag-js/utils": 1.42.0

minimumReleaseAgeExclude:
  - vite@8.1.4
  - '@storybook/addon-a11y@10.5.0'
  - '@storybook/addon-docs@10.5.0'
  - '@storybook/csf-plugin@10.5.0'
  - '@storybook/react-dom-shim@10.5.0'
  - storybook@10.5.0
  - '@solidjs/signals@2.0.0-beta.19'
  - '@solidjs/web@2.0.0-beta.19'
  - solid-js@2.0.0-beta.19
  - '@tanstack/virtual-core@3.17.4'
  - '@internationalized/date@3.12.2'
  - '@solid-primitives/a11y@1.0.0-next.0'
  - '@zag-js/core@1.42.0'
  - '@zag-js/types@1.42.0'
  - '@zag-js/utils@1.42.0'
  # apps/docs (TanStack Start) deps still in cooldown — excluded so `pnpm install` isn't gated.
  - '@tanstack/solid-router@2.0.0-beta.24'
  - '@tanstack/solid-start@2.0.0-beta.25'
  - '@tanstack/solid-start-client@2.0.0-beta.24'
  - '@tanstack/solid-start-server@2.0.0-beta.24'
  - '@tanstack/start-static-server-functions@1.167.18'
  - 'vite-plugin-solid@3.0.0-next.11'
  - 'babel-preset-solid@2.0.0-beta.19'
  # Name pattern (no version): pnpm forbids a version union on a wildcard name.
  - '@dom-expressions/*'
